<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Rock, Paper, Scissors</title>
  </head>
  <body>
    <!-- TITLE -->
    <h1>Rock, paper, scissors</h1>
    <!-- GAME -->
    <div class="game-row">
      <div class="game-col">
        <h2>You</h2>
        <div class="score">
          <span id="userScore">0</span>
        </div>
        <div class="selection">
          <span id="userSelection">Your selection: </span>
        </div>
      </div>
      <div class="game-col">
        <h2>Computer</h2>
        <div class="score">
          <span id="computerScore">0</span>
        </div>
        <div class="selection">
          <span id="computerSelection">Computer selection: </span>
        </div>
      </div>
    </div>
    <!-- INSTRUCTIONS -->
    <div class="instructions-row">
      <p id="rules">Select rock, paper or scissors.</p>
      <button id="reset">Replay ?</button>
    </div>
    <!-- CHOICES -->
    <div class="choices-row">
      <div class="choice">
        <img id="rock" src="img/rock.png" alt="Rock" />
      </div>
      <div class="choice">
        <img id="paper" src="img/paper.png" alt="Paper" />
      </div>
      <div class="choice">
        <img id="scissors" src="img/scissors.png" alt="Scissors" />
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
