<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- META -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS -->
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <!-- TITLE -->
    <title>Rock, Paper, Scissors</title>
  </head>
  <body>

    <div class="container">
      <div class="header-section">
        <h1 class="title">Rock, Paper, Scissors</h1>
        <h2 class="assignment">Choose your weapon: Rock, Paper or Scissors?</h2>
      </div>
      <div class="game-section">
        <div class="weapon">
          <div class="image">
            <img src="./img/rock.png" alt="Rock image" />
          </div>
          <div class="name">Rock</div>
        </div>
        <div class="weapon">
          <div class="image">
            <img src="./img/paper.png" alt="Paper image" />
          </div>
          <div class="name">Paper</div>
        </div>
        <div class="weapon">
          <div class="image">
            <img src="./img/scissors.png" alt="Scissors image" />
          </div>
          <div class="name">Scissors</div>
        </div>
      </div>
      <div class="result-section">Result: You win!</div>
    </div>

    <script src="./js/script.js"></script>

  </body>
</html>
